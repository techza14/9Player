name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect APK assets
        id: assets
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(release/*.apk app/build/outputs/**/*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No APK files found in release/ or app/build/outputs/."
            exit 1
          fi
          {
            echo "files<<EOF"
            for f in "${files[@]}"; do
              echo "$f"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          printf 'Will upload:\n%s\n' "${files[@]}"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          draft: false
          prerelease: false
          files: ${{ steps.assets.outputs.files }}
