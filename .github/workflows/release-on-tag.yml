name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate signing secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"; missing=1; fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then echo "::error::Missing secret ANDROID_KEY_ALIAS"; missing=1; fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then echo "::error::Missing secret ANDROID_KEYSTORE_PASSWORD"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Build release APK (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          output_apk="release/9player-${{ steps.tag.outputs.value }}.apk"
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n1)"
          if [ -z "$apksigner_path" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          key_pass="$KEY_PASSWORD"
          if [ -z "$key_pass" ]; then
            key_pass="$KEYSTORE_PASSWORD"
          fi
          "$apksigner_path" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$key_pass" \
            --out "$output_apk" \
            "$unsigned_apk"
          "$apksigner_path" verify --verbose "$output_apk"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          draft: false
          prerelease: false
          files: release/9player-${{ steps.tag.outputs.value }}.apk
